name: CI Tests
on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    branches:
      - 'master'
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  go-fmt-and-vet:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    - name: Go Formatting
      run: |
        files=$(go fmt ./...)
        if [ -n "$files" ]; then
          echo "The following file(s) do not conform to go fmt:"
          echo "$files"
          exit 1
        fi
  go-test:
    needs: go-fmt-and-vet
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        args: --exclude-files '.*_test\.go'
    - name: Run race detector tests (skip large data tests)
      run: |
        go test -race -short -v ./...
    - name: Run full test suite with coverage (no race detector)
      run: |
        go test -v -coverprofile=coverage.out ./...
    - name: Upload Coverage report
      uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
      with: 
        path: coverage.out
        name: Coverage-report
    - name: Display coverage report
      run: go tool cover -func=coverage.out
    - name: Build Go
      run: go build ./...
